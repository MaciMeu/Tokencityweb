<div class="controls-bar theme-toggle-container">
    <div class="theme-toggle" onclick="window.toggleTheme()">
        <!-- El contenido se genera dinámicamente en updateToggleVisuals -->
    </div>

    <div class="lang-toggle" onclick="window.toggleLanguage()">
        <span class="lang-label lang-label-es">ES</span>
        <div class="lang-switch-track">
            <div class="lang-switch-thumb"></div>
        </div>
        <span class="lang-label lang-label-en">EN</span>
    </div>
</div>
